syntax = "proto3";

package api.health_guidance;

message HealthGuideType {
  int32 id = 1;
  string type_name = 2;
  int32 icon = 3;
  int32 type_sum = 4;
  string type_two = 5;
  string description = 6;
}

message HealthGuideTypeRequest {
  string type_name = 1;
  int32 icon = 2;
  int32 type_sum = 3;
  string type_two = 4;
  string description = 5;
}

message HealthGuideTypeResponse {
  repeated HealthGuideType health_guide_types = 1;
  int32 code = 2;
  string message = 3;
}

message HealthGuideContent {
  int32 id = 1;
  int32 type_one = 2;
  string type_two = 3;
  string content = 4;
}

message HealthGuideContentRequest {
  int32 type_one = 1;
  string type_two = 2;
  string content = 3;
}

message HealthGuideContentResponse {
  repeated HealthGuideContent health_guide_contents = 1;
  int32 code = 2;
  string message = 3;
}
